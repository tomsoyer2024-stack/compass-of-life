<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <title>Compass</title>
</head>

<body style="margin: 0; padding: 0; background-color: #f5f5f7;">
  <div id="global-error-display"
    style="display:none; padding:20px; background:white; color:red; font-family:monospace; white-space:pre-wrap; border:5px solid red; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999;">
  </div>
  <script>
    window.onerror = function (message, source, lineno, colno, error) {
      const display = document.getElementById('global-error-display');
      if (display) {
        display.style.display = 'block';
        display.innerHTML = '<h2>🛑 CRITICAL ERROR</h2>' + message + '<br><small>' + source + ':' + lineno + '</small>';
      }
      return false;
    };
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
